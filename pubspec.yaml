name: todolist
description: A production-grade Task Manager with Firebase Auth + Firestore + Notifications
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:

  flutter:
    sdk: flutter
  http: ^1.2.0
  # Firebase Core
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.1


  # State Management
  flutter_riverpod: ^2.5.1

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # UI/UX
  flutter_slidable: ^3.1.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Add assets if you have any
  # assets:
  #   - assets/images/